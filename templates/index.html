<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <div class="container mx-auto p-6">

        <div class="mb-8">
            <h1 class="text-4xl font-bold">Network Monitoring Dashboard</h1>
            <p class="text-gray-400 mt-2">Live traffic monitoring using PyShark</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">

            <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                <h2 class="text-gray-400">Total Packets</h2>
                <p id="totalPackets" class="text-3xl font-bold mt-2">0</p>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                <h2 class="text-gray-400">TCP Traffic</h2>
                <p id="tcpCount" class="text-3xl font-bold mt-2">0</p>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                <h2 class="text-gray-400">UDP Traffic</h2>
                <p id="udpCount" class="text-3xl font-bold mt-2">0</p>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                <h2 class="text-gray-400">ICMP Traffic</h2>
                <p id="icmpCount" class="text-3xl font-bold mt-2">0</p>
            </div>

        </div>

        <div class="bg-gray-800 rounded-xl shadow-lg overflow-hidden">

            <div class="p-4 border-b border-gray-700">
                <h2 class="text-xl font-bold">Live Network Traffic</h2>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-left">

                    <thead class="bg-gray-700">
                        <tr>
                            <th class="p-4">ID</th>
                            <th class="p-4">Source IP</th>
                            <th class="p-4">Destination IP</th>
                            <th class="p-4">Protocol</th>
                            <th class="p-4">Length</th>
                        </tr>
                    </thead>

                    <tbody id="packetTable"></tbody>

                </table>
            </div>

        </div>

    </div>

    <script src="/static/js/app.js"></script>

</body>
</html>
